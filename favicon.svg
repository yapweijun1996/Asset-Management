<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="48" x2="0" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="48" x2="0" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A5B4FC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="48" x2="0" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C7D2FE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Rising bar chart -->
  <rect x="12" y="32" width="10" height="18" rx="3" fill="url(#bar1)" opacity="0.85"/>
  <rect x="27" y="24" width="10" height="26" rx="3" fill="url(#bar2)" opacity="0.9"/>
  <rect x="42" y="16" width="10" height="34" rx="3" fill="url(#bar3)"/>
  <!-- Upward trend line -->
  <path d="M17 30 L32 22 L47 14" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <!-- Arrow tip -->
  <path d="M44 12 L48 14 L45 17" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
